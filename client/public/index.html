<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Starship Psychics</title>

    <!-- PWA Manifest & Theme -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="theme-color" content="#667eea" />

    <!-- iOS PWA -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Starship Psychics" />

    <!-- Android / Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Stripe.js is loaded by @stripe/stripe-js npm package in PaymentMethodPage.js -->
    <!-- Do NOT load https://js.stripe.com/v3/ here as it conflicts with the npm package version -->
    <script>
        // Suppress hCaptcha non-passive event listener warnings
        // These warnings originate from third-party iframe code and don't affect functionality
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('[Violation]') && args[0].includes('hcaptcha')) {
                return; // Suppress hCaptcha violations
            }
            originalWarn.apply(console, args);
        };

        // Suppress the Stripe "HTTP vs HTTPS" informational log.
        // In development (http://localhost) Stripe.js always logs this; it is purely
        // informational — live integrations run over HTTPS and never trigger it.
        const originalLog = console.log;
        console.log = function(...args) {
            if (args[0] && typeof args[0] === 'string' &&
                args[0].indexOf('You may test your Stripe.js integration over HTTP') !== -1) {
                return; // Suppress Stripe dev-only HTTP notice
            }
            originalLog.apply(console, args);
        };

        // Suppress ResizeObserver loop errors.
        // This script runs BEFORE the webpack HMR/CRA dev-overlay bundle, so our
        // capture-phase listener is registered first and wins the stopImmediatePropagation race.
        // The same suppression is also duplicated in index.jsx for belt-and-suspenders.
        //
        // Also suppresses the MutationObserver "parameter 1 is not of type 'Node'" error that
        // originates from browser-extension content scripts (e.g. password managers) injecting
        // into Stripe's iframe before the iframe document body is attached to the DOM.
        // The error is thrown inside web-client-content-script.js — entirely third-party code —
        // and has no effect on Stripe functionality or our application.
        window.addEventListener('error', function(event) {
            if (!event || !event.message) return;
            if (event.message.indexOf('ResizeObserver loop completed') !== -1) {
                event.stopImmediatePropagation();
                event.preventDefault();
                return;
            }
            // MutationObserver error from browser-extension content scripts inside Stripe iframes
            if (event.message.indexOf("Failed to execute 'observe' on 'MutationObserver'") !== -1 &&
                event.message.indexOf('parameter 1 is not of type') !== -1) {
                event.stopImmediatePropagation();
                event.preventDefault();
            }
        }, true /* capture phase */);

        // window.onerror fallback — belt-and-suspenders for the MutationObserver error.
        // Some browsers (especially older Chrome / Edge versions) do not reliably fire
        // the capture-phase 'error' event for errors thrown inside extension content
        // scripts.  Returning true from window.onerror is the last-resort suppression.
        window.onerror = function(message) {
            if (!message) return false;
            if (message.indexOf("Failed to execute 'observe' on 'MutationObserver'") !== -1 &&
                message.indexOf('parameter 1 is not of type') !== -1) {
                return true; // returning true tells the browser not to log the error
            }
            return false;
        };

        // Suppress Stripe telemetry unhandled-promise-rejection noise.
        // Stripe.js posts internal analytics to https://r.stripe.com/b.  In environments
        // where that host is unreachable (ad-blockers, corporate proxies, local dev) the
        // fetch rejects with "Failed to fetch" and — because Stripe doesn't add a .catch()
        // on that particular internal call — it surfaces as an unhandledrejection in the
        // console.  It has zero effect on payment processing.  We suppress it here so it
        // doesn't pollute the developer console or confuse monitoring dashboards.
        window.addEventListener('unhandledrejection', function(event) {
            if (!event || !event.reason) return;
            var msg = (event.reason && event.reason.message) ? event.reason.message : String(event.reason);
            // FetchError from Stripe's telemetry endpoint (r.stripe.com/b, r2.stripe.com, etc.)
            if (msg.indexOf('r.stripe.com') !== -1 ||
                msg.indexOf('r2.stripe.com') !== -1 ||
                msg.indexOf('m.stripe.com') !== -1 ||
                msg.indexOf('m.stripe.network') !== -1) {
                event.preventDefault();
            }
        }, true /* capture phase */);
    </script>
</head>
<body>
<noscript>You need to enable JavaScript to run this app.</noscript>
<div id="root"></div>
</body>
</html>
