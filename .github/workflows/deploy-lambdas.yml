name: Deploy Lambdas (SAM)

on:
  push:
    branches:
      - main
    paths:
      - 'lambdas/**'
      - 'infrastructure/template.yaml'
      - 'infrastructure/samconfig-production.toml'
      - '.github/workflows/deploy-lambdas.yml'

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Build & Deploy Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python (required by SAM CLI)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js (for Lambda functions)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        working-directory: infrastructure
        run: sam build --template-file template.yaml

      - name: SAM deploy
        working-directory: infrastructure
        run: |
          sam deploy \
            --config-file samconfig-production.toml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: List deployed Lambda functions
        run: |
          echo "📋 Deployed Lambda functions:"
          aws lambda list-functions \
            --query "Functions[?contains(FunctionName, 'production')].{Name:FunctionName,Runtime:Runtime,LastModified:LastModified}" \
            --output table

      - name: Deployment summary
        run: |
          echo "✅ Lambda functions deployed successfully!"
