name: Deploy Client to S3/CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/deploy-client.yml'

env:
  AWS_REGION: us-east-1
  S3_BUCKET: app.starshippsychics.com
  CLOUDFRONT_DISTRIBUTION_ID: EI3I0LQC8J618

jobs:
  deploy:
    name: Build & Deploy Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build production bundle
        working-directory: client
        env:
          CI: false  # Prevent treating warnings as errors
        run: npm run build

      - name: Sync HTML files (no-cache)
        run: |
          aws s3 sync client/build s3://${{ env.S3_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --delete \
            --exclude "*" --include "*.html" \
            --content-type "text/html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Sync JSON files (no-cache)
        run: |
          aws s3 sync client/build s3://${{ env.S3_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --exclude "*" --include "*.json" \
            --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Sync CSS files (immutable cache)
        run: |
          aws s3 sync client/build s3://${{ env.S3_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --exclude "*" --include "*.css" \
            --content-type "text/css" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync service-worker.js (no-cache)
        run: |
          aws s3 cp client/build/service-worker.js s3://${{ env.S3_BUCKET }}/service-worker.js \
            --region ${{ env.AWS_REGION }} \
            --content-type "application/javascript" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Sync JS files (immutable cache, exclude service-worker)
        run: |
          aws s3 sync client/build s3://${{ env.S3_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --exclude "*" --include "*.js" --exclude "service-worker.js" \
            --content-type "application/javascript" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync image files (immutable cache)
        run: |
          for ext in png jpg jpeg gif svg ico; do
            mime="image/$ext"
            [ "$ext" = "jpg" ] && mime="image/jpeg"
            [ "$ext" = "jpeg" ] && mime="image/jpeg"
            [ "$ext" = "svg" ] && mime="image/svg+xml"
            [ "$ext" = "ico" ] && mime="image/x-icon"
            aws s3 sync client/build s3://${{ env.S3_BUCKET }}/ \
              --region ${{ env.AWS_REGION }} \
              --exclude "*" --include "*.$ext" \
              --content-type "$mime" \
              --cache-control "public, max-age=31536000, immutable"
          done

      - name: Sync PDF files
        run: |
          aws s3 sync client/build s3://${{ env.S3_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --exclude "*" --include "*.pdf" \
            --content-type "application/pdf" \
            --cache-control "public, max-age=86400"

      - name: Sync remaining files (fonts, etc.)
        run: |
          aws s3 sync client/build s3://${{ env.S3_BUCKET }}/ \
            --region ${{ env.AWS_REGION }} \
            --exclude "*.html" --exclude "*.json" --exclude "*.css" \
            --exclude "*.js" --exclude "*.png" --exclude "*.jpg" \
            --exclude "*.jpeg" --exclude "*.gif" --exclude "*.svg" \
            --exclude "*.ico" --exclude "*.pdf"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "CloudFront invalidation created: $INVALIDATION_ID"

      - name: Deployment summary
        run: |
          echo "✅ Client deployed successfully!"
          echo "🌐 Live at: https://app.starshippsychics.com"
          echo "⚡ CloudFront cache invalidation may take 2-3 minutes to propagate"
